name: Wordocious
options:
  bundleIdPrefix: com.wordocious
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  WordociousCore:
    path: .
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0

targets:
  Wordocious:
    type: application
    platform: iOS
    sources:
      - path: Wordocious/Sources
      - path: Wordocious/Resources
    dependencies:
      - package: WordociousCore
        product: WordociousCore
      - package: Supabase
        product: Supabase
      - package: SocketIO
        product: SocketIO
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: Wordocious/Info.plist
      properties:
        CFBundleDisplayName: Wordocious
        # Exempt encryption only (HTTPS/TLS via the OS + CryptoKit) — declare it
        # so App Store Connect stops prompting the export-compliance dialog on
        # every upload. Matches the "None of the algorithms above" answer.
        ITSAppUsesNonExemptEncryption: false
        # Pull the bundle version/short-version from the build settings
        # (CURRENT_PROJECT_VERSION / MARKETING_VERSION) so a bumped build number
        # actually reaches the binary — xcodegen otherwise hardcodes "1".
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Nunito.ttf
        CFBundleURLTypes:
          - CFBundleURLName: com.wordocious.app.auth
            CFBundleURLSchemes:
              - com.wordocious.app
          # Google Sign-In callback — the reversed iOS OAuth client ID.
          - CFBundleURLName: com.wordocious.app.google
            CFBundleURLSchemes:
              - com.googleusercontent.apps.193086095286-4ftdf92g8cnsur8kd7odqq0jueqq5oog
        # AdMob app ID — real Wordocious AdMob app (created 2026-06-03).
        GADApplicationIdentifier: ca-app-pub-3015627373086578~8393761846
        # App Tracking Transparency prompt copy (shown before requesting IDFA).
        NSUserTrackingUsageDescription: Allow tracking to show you more relevant ads. Wordocious never sells your data.
        # Camera permission — used only when taking a new profile photo.
        NSCameraUsageDescription: Take a photo for your Wordocious profile picture.
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordocious.app
        PRODUCT_NAME: Wordocious
        DEVELOPMENT_TEAM: Q32F6GRDYG
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Wordocious/Wordocious.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "30"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Wordocious:
    build:
      targets:
        Wordocious: all
    run:
      # Local StoreKit testing — lets purchases run in the simulator without
      # App Store Connect. Remove/ignore for App Store builds (real products).
      storeKitConfiguration: Wordocious.storekit

fileGroups:
  - Wordocious.storekit
