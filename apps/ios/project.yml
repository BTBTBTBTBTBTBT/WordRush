name: Wordocious
options:
  bundleIdPrefix: com.wordocious
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  WordociousCore:
    path: .
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0

targets:
  Wordocious:
    type: application
    platform: iOS
    sources:
      - path: Wordocious/Sources
      - path: Wordocious/Resources
    dependencies:
      - package: WordociousCore
        product: WordociousCore
      - package: Supabase
        product: Supabase
      - package: SocketIO
        product: SocketIO
      - package: GoogleMobileAds
        product: GoogleMobileAds
    info:
      path: Wordocious/Info.plist
      properties:
        CFBundleDisplayName: Wordocious
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Nunito.ttf
        CFBundleURLTypes:
          - CFBundleURLName: com.wordocious.app.auth
            CFBundleURLSchemes:
              - com.wordocious.app
        # AdMob app ID — currently Google's TEST app ID. Replace with the real
        # ca-app-pub-XXXX~YYYY from the AdMob console before release.
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        # App Tracking Transparency prompt copy (shown before requesting IDFA).
        NSUserTrackingUsageDescription: Allow tracking to show you more relevant ads. Wordocious never sells your data.
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordocious.app
        PRODUCT_NAME: Wordocious
        DEVELOPMENT_TEAM: Q32F6GRDYG
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Wordocious/Wordocious.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Wordocious:
    build:
      targets:
        Wordocious: all
    run:
      # Local StoreKit testing — lets purchases run in the simulator without
      # App Store Connect. Remove/ignore for App Store builds (real products).
      storeKitConfiguration: Wordocious.storekit

fileGroups:
  - Wordocious.storekit
