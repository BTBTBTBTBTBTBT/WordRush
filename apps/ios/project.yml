name: Wordocious
options:
  bundleIdPrefix: com.wordocious
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  WordociousCore:
    path: .
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  Wordocious:
    type: application
    platform: iOS
    sources:
      - path: Wordocious/Sources
      - path: Wordocious/Resources
    dependencies:
      - package: WordociousCore
        product: WordociousCore
      - package: Supabase
        product: Supabase
    info:
      path: Wordocious/Info.plist
      properties:
        CFBundleDisplayName: Wordocious
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Nunito.ttf
        CFBundleURLTypes:
          - CFBundleURLName: com.wordocious.app.auth
            CFBundleURLSchemes:
              - com.wordocious.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordocious.app
        PRODUCT_NAME: Wordocious
        DEVELOPMENT_TEAM: Q32F6GRDYG
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Wordocious/Wordocious.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""

schemes:
  Wordocious:
    build:
      targets:
        Wordocious: all
    run:
      # Local StoreKit testing — lets purchases run in the simulator without
      # App Store Connect. Remove/ignore for App Store builds (real products).
      storeKitConfiguration: Wordocious.storekit

fileGroups:
  - Wordocious.storekit
