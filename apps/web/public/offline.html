<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordocious - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8f7ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      font-weight: 700;
      color: #9ca3af;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    button {
      display: inline-block;
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      box-shadow: 0 4px 0 #4c1d95;
      color: white;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.1s;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #4c1d95; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>No Connection</h1>
    <p>Wordocious needs an internet connection to load puzzles and sync your progress. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
